<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${editando} ? 'Editar Plan' : 'Nuevo Plan'">Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('planes')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4 th:text="${editando} ? 'EDITAR PLAN' : 'CREAR PLAN'"></h4>
            <a th:href="@{/admin/planes}" class="btn btn-outline-neon btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>

          <div class="member-form-box">
            <form th:action="${editando} ? @{/admin/planes/editar/{id}(id=${plan.id})} : @{/admin/planes/nuevo}"
                  th:object="${plan}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-neon">Nombre</label>
                  <input type="text" th:field="*{nombre}" class="form-control-dark" placeholder="Ej: Básico" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Precio</label>
                  <input type="number" step="0.01" th:field="*{precio}" class="form-control-dark" placeholder="79.00" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Duración (días)</label>
                  <input type="number" th:field="*{duracionDias}" class="form-control-dark" placeholder="30" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Activo</label>
                  <select th:field="*{activo}" class="form-control-dark">
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Descripción</label>
                  <textarea th:field="*{descripcion}" class="form-control-dark" rows="3" placeholder="Texto breve sobre el plan"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Beneficios (separados por coma)</label>
                  <textarea th:field="*{beneficios}" class="form-control-dark" rows="3" placeholder="Sala de pesas, Clases ilimitadas, Acceso 24/7"></textarea>
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-neon w-100"><i class="bi bi-save me-2"></i>
                    <span th:text="${editando} ? 'Actualizar Plan' : 'Crear Plan'"></span>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
