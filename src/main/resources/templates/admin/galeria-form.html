<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${galeriaItem != null} ? 'Editar Imagen' : 'Nueva Imagen'">Galería</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('galeria')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4 th:text="${galeriaItem != null} ? 'EDITAR IMAGEN' : 'SUBIR IMAGEN'"></h4>
            <a th:href="@{/admin/galeria}" class="btn btn-outline-neon btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>

          <div class="member-form-box">
            <form th:action="@{/admin/galeria/editar/{id}(id=${galeriaItem.id})}" method="post" enctype="multipart/form-data">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-neon">Nombre</label>
                  <input type="text" name="nombre" th:value="${galeriaItem.nombre}" class="form-control-dark" placeholder="Sala de pesas" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Activo</label>
                  <select name="activo" class="form-control-dark">
                    <option th:value="true" th:selected="${galeriaItem.activo}">Sí</option>
                    <option th:value="false" th:selected="${!galeriaItem.activo}">No</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Descripción</label>
                  <textarea name="descripcion" class="form-control-dark" rows="3" placeholder="Breve descripción">[[${galeriaItem.descripcion}]]</textarea>
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Reemplazar imagen</label>
                  <input type="file" name="archivo" class="form-control-dark" accept="image/*" />
                  <small class="demo-hint">Deja vacío para conservar la imagen actual.</small>
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-neon w-100"><i class="bi bi-save me-2"></i>Guardar cambios</button>
                </div>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
