<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${editando} ? 'Editar Promoción' : 'Nueva Promoción'">Promoción</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('promociones')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4 th:text="${editando} ? 'EDITAR PROMOCIÓN' : 'CREAR PROMOCIÓN'"></h4>
            <a th:href="@{/admin/promociones}" class="btn btn-outline-neon btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>

          <div class="member-form-box">
            <form th:action="${editando} ? @{/admin/promociones/editar/{id}(id=${promotion.id})} : @{/admin/promociones/nuevo}"
                  th:object="${promotion}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-neon">Título</label>
                  <input type="text" th:field="*{titulo}" class="form-control-dark" placeholder="Ej: Primer mes gratis" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Botón</label>
                  <input type="text" th:field="*{botonTexto}" class="form-control-dark" placeholder="Ej: Ver Promo" />
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Descripción</label>
                  <textarea th:field="*{descripcion}" class="form-control-dark" rows="4" placeholder="Descripción de la promoción"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label-neon">Enlace</label>
                  <input type="text" th:field="*{enlace}" class="form-control-dark" placeholder="https://wa.me/51999000000" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Activo</label>
                  <select th:field="*{activo}" class="form-control-dark">
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label-neon">Orden</label>
                  <input type="number" th:field="*{orden}" class="form-control-dark" placeholder="0" />
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-neon w-100"><i class="bi bi-save me-2"></i>
                    <span th:text="${editando} ? 'Actualizar Promoción' : 'Crear Promoción'"></span>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
