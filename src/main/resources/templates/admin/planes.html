<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planes — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('planes')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4>GESTIÓN DE <span>PLANES</span></h4>
            <a th:href="@{/admin/planes/nuevo}" class="btn btn-neon btn-sm">
              <i class="bi bi-plus-lg me-1"></i>Nuevo Plan
            </a>
          </div>

          <div th:if="${exito}" class="alert-success-gym mb-3" th:text="${exito}"></div>
          <div th:if="${error}" class="alert-error mb-3" th:text="${error}"></div>

          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Precio</th>
                  <th>Duración</th>
                  <th>Activo</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="plan : ${planes}">
                  <td th:text="${plan.nombre}"></td>
                  <td th:text="'S/ ' + ${#numbers.formatDecimal(plan.precio, 0, 'COMMA', 2, 'POINT')}"></td>
                  <td th:text="${plan.duracionDias} + ' días'"></td>
                  <td>
                    <span th:text="${plan.activo} ? 'Sí' : 'No'" th:classappend="${plan.activo} ? 'badge-status activo' : 'badge-status vencido'"></span>
                  </td>
                  <td>
                    <a th:href="@{/admin/planes/editar/{id}(id=${plan.id})}" class="btn-icon" title="Editar"><i class="bi bi-pencil-square"></i></a>
                    <form th:action="@{/admin/planes/eliminar/{id}(id=${plan.id})}" method="post" style="display:inline-block;">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                      <button type="submit" class="btn-icon" title="Eliminar" style="border:none;background:none;color:#f55;">
                        <i class="bi bi-trash3-fill"></i>
                      </button>
                    </form>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(planes)}">
                  <td colspan="5" class="text-center" style="color:#bbb;padding:2rem;">No hay planes registrados.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
