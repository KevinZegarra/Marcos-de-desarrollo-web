<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagos — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div id="adminPage" class="page active">
  <div class="admin-wrap">

    <div th:replace="~{fragments/header :: admin-sidebar('pagos')}"></div>

    <div class="admin-content">
      <div class="admin-panel active">

        <div class="admin-topbar">
          <h4>CONTROL DE <span>PAGOS</span></h4>
        </div>

        <!-- KPIs de pagos -->
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <div class="kpi-card">
              <div class="kpi-num" style="color:#4ade80;"
                   th:text="'S/ ' + ${#numbers.formatDecimal(ingresosMes, 0, 'COMMA', 2, 'POINT')}">—</div>
              <div class="kpi-label">Cobrado este mes</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="kpi-card">
              <div class="kpi-num" style="color:var(--neon);"
                   th:text="'S/ ' + ${#numbers.formatDecimal(ingresosAnio, 0, 'COMMA', 2, 'POINT')}">—</div>
              <div class="kpi-label">Ingresos del año</div>
            </div>
          </div>
        </div>

        <!-- Tabla de pagos -->
        <div class="chart-wrap">
          <div class="chart-title">💳 Historial de pagos</div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Miembro</th>
                  <th>Plan</th>
                  <th>Monto</th>
                  <th>Fecha pago</th>
                  <th>Vence</th>
                  <th>Método</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${#lists.isEmpty(pagos)}">
                  <td colspan="7" style="text-align:center;color:#555;padding:2.5rem;">
                    No hay pagos registrados aún.
                  </td>
                </tr>
                <tr th:each="p : ${pagos}">
                  <td><strong th:text="${p.cliente.nombreCompleto}"></strong></td>
                  <td>
                    <span class="badge-plan"
                          th:classappend="'badge-' + ${p.plan.nombre.toLowerCase()}"
                          th:text="${p.plan.nombre}"></span>
                  </td>
                  <td style="font-family:'Barlow Condensed';font-size:1rem;font-weight:800;color:var(--neon);"
                      th:text="'S/ ' + ${#numbers.formatDecimal(p.monto,0,'COMMA',2,'POINT')}"></td>
                  <td style="color:#666;font-size:.82rem;"
                      th:text="${#temporals.format(p.fechaPago,'dd/MM/yyyy')}"></td>
                  <td style="color:#666;font-size:.82rem;"
                      th:text="${#temporals.format(p.fechaVencimiento,'dd/MM/yyyy')}"></td>
                  <td style="color:#888;" th:text="${p.metodoPago ?: 'Efectivo'}"></td>
                  <td>
                    <span th:classappend="${p.estado.name()=='PAGADO'} ? 'badge-status activo' : 'badge-status vencido'"
                          th:text="${p.estado.name()=='PAGADO'} ? 'Pagado' : 'Vencido'"></span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
