# ═══════════════════════════════════════
# AY FITNESS GYM — Configuración
# ═══════════════════════════════════════

spring.application.name=AY Fitness Gym

# ── Base de datos MySQL ──────────────────
# IMPORTANTE: Crea la BD antes de arrancar:
#   CREATE DATABASE ayfitnessgym CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/ayfitnessgym?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Servidor ─────────────────────────────
server.port=8080
server.servlet.context-path=/


# ── Subida de archivos (galería) ─────────
# Aumentar límite a 20MB para imágenes
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── Logging ──────────────────────────────
logging.level.com.gym=DEBUG
logging.level.org.springframework.security=INFO

# Directorio local para archivos subidos (imágenes de galería)
app.upload-dir=uploads

# ── JWT (seguridad del dueño para la API) ─
# jwt.secret: clave para firmar los tokens. Cámbiala por una propia
# (mínimo 32 caracteres) antes de subir a producción.
jwt.secret=cambia-esta-clave-por-una-secreta-de-al-menos-32-caracteres
# jwt.expiration-ms: tiempo de vida del token (aquí: 24 horas)
jwt.expiration-ms=86400000

