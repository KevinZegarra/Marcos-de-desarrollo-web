<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);">

  <div class="modal-box" style="position:relative;max-width:420px;width:100%;margin:2rem;">

    <!-- Logo -->
    <div class="text-center mb-4">
      <img th:src="@{/images/logo.png}" alt="AY Fitness Gym" width="90" onerror="this.style.display='none'"
        style="border-radius:50%;margin-bottom:.5rem;" />

      <div class="modal-logo">AY <span>FITNESS GYM</span></div>
      <div class="modal-subtitle">Panel de Administración</div>
    </div>

    
    <!-- Mensajes de error / logout -->
    <div th:if="${error}" class="alert-error mb-3">
      <i class="bi bi-exclamation-triangle me-2"></i>
      <span th:text="${error}"></span>
    </div>
    <div th:if="${msg}" class="alert alert-success mb-3"
      style="background:#0d2a0d;border:1px solid #2a5a2a;color:#7dea7d;border-radius:4px;padding:.75rem;">
      <i class="bi bi-check-circle me-2"></i>
      <span th:text="${msg}"></span>
    </div>

    <!-- Formulario de login -->
    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <label class="form-label-neon">Usuario</label>
      <input type="text" class="form-control-dark" name="username" placeholder="Ingresa tu usuario"
        autocomplete="username" required style="margin-bottom:1rem;" />

      <label class="form-label-neon">Contraseña</label>
      <input type="password" class="form-control-dark" name="password" placeholder="••••••••"
        autocomplete="current-password" required style="margin-bottom:1.5rem;" />

      <button type="submit" class="btn btn-neon w-100" style="padding:.75rem;">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <div class="demo-hint mt-3">
      Credenciales por defecto: <strong>admin / admin123</strong>
    </div>

    <div class="text-center mt-3">
      <a th:href="@{/}" style="color:var(--muted);font-size:.82rem;">
        <i class="bi bi-arrow-left me-1"></i>Volver al sitio
      </a>
    </div>

  </div>

</body>

</html>
