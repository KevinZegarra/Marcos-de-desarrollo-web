<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="adminPage" class="page active">
  <div class="admin-wrap">

    <div th:replace="~{fragments/header :: admin-sidebar('reportes')}"></div>

    <div class="admin-content">
      <div class="admin-panel active">

        <div class="admin-topbar">
          <h4>ESTADÍS<span>TICAS</span></h4>
        </div>

        <!-- KPIs generales -->
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:var(--neon)" th:text="${metricas.totalClientes}">0</div>
              <div class="kpi-label">Total Miembros</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:#4ade80" th:text="${metricas.clientesActivos}">0</div>
              <div class="kpi-label">Activos</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:var(--orange)" th:text="${metricas.clientesPorVencer}">0</div>
              <div class="kpi-label">Por vencer</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:var(--red)" th:text="${metricas.clientesVencidos}">0</div>
              <div class="kpi-label">Vencidos</div>
            </div>
          </div>
        </div>

        <!-- Ingresos resumen -->
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:var(--neon);font-size:2rem;"
                   th:text="'S/ ' + ${#numbers.formatDecimal(metricas.ingresosMes,0,'COMMA',2,'POINT')}">—</div>
              <div class="kpi-label">Ingresos del mes actual</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="kpi-card text-center">
              <div class="kpi-num" style="color:#4ade80;font-size:2rem;"
                   th:text="'S/ ' + ${#numbers.formatDecimal(metricas.ingresosAnio,0,'COMMA',2,'POINT')}">—</div>
              <div class="kpi-label">Ingresos del año</div>
            </div>
          </div>
        </div>

        <!-- Gráficos Chart.js -->
        <div class="row g-4">
          <div class="col-md-6">
            <div class="chart-wrap">
              <div class="chart-title">📊 Ingresos mensuales (S/)</div>
              <canvas id="chartIngresos" height="200"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="chart-wrap">
              <div class="chart-title">👥 Nuevos miembros por mes</div>
              <canvas id="chartMiembros" height="200"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="chart-wrap">
              <div class="chart-title">📋 Distribución por plan</div>
              <canvas id="chartPlanes" height="200"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="chart-wrap">
              <div class="chart-title">⚡ Estado de membresías</div>
              <canvas id="chartEstados" height="200"></canvas>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const ingresosMensuales = /*[[${metricas.ingresosMensuales}]]*/ [];
  const nuevosMiembros    = /*[[${metricas.nuevosMiembrosMes}]]*/ [];
  const countBasico = /*[[${metricas.countBasico}]]*/ 0;
  const countPro    = /*[[${metricas.countPro}]]*/ 0;
  const countElite  = /*[[${metricas.countElite}]]*/ 0;
  const activos     = /*[[${metricas.clientesActivos}]]*/ 0;
  const porVencer   = /*[[${metricas.clientesPorVencer}]]*/ 0;
  const vencidos    = /*[[${metricas.clientesVencidos}]]*/ 0;

  const defaults = {
    color: '#C8FF00',
    plugins: { legend: { labels: { color: '#888', font: { family: 'Barlow' } } } },
    scales: {
      x: { ticks: { color:'#555' }, grid: { color:'#1e1e1e' } },
      y: { ticks: { color:'#555' }, grid: { color:'#1e1e1e' } }
    }
  };

  // Ingresos
  new Chart(document.getElementById('chartIngresos'), {
    type: 'bar',
    data: {
      labels: meses,
      datasets: [{ label: 'S/ Ingresos', data: ingresosMensuales,
        backgroundColor: '#1a3a00', borderColor: '#C8FF00', borderWidth: 2, borderRadius: 4 }]
    },
    options: { responsive:true, plugins: defaults.plugins, scales: defaults.scales }
  });

  // Nuevos miembros
  new Chart(document.getElementById('chartMiembros'), {
    type: 'line',
    data: {
      labels: meses,
      datasets: [{ label: 'Nuevos miembros', data: nuevosMiembros,
        borderColor: '#00FFB2', backgroundColor: 'rgba(0,255,178,.1)',
        tension: 0.4, fill: true, pointBackgroundColor: '#00FFB2' }]
    },
    options: { responsive:true, plugins: defaults.plugins, scales: defaults.scales }
  });

  // Distribución planes
  new Chart(document.getElementById('chartPlanes'), {
    type: 'doughnut',
    data: {
      labels: ['Básico', 'Pro', 'Elite'],
      datasets: [{ data: [countBasico, countPro, countElite],
        backgroundColor: ['#333', '#C8FF00', '#ff9500'], borderWidth: 0 }]
    },
    options: { responsive:true, plugins: defaults.plugins }
  });

  // Estados
  new Chart(document.getElementById('chartEstados'), {
    type: 'pie',
    data: {
      labels: ['Activos', 'Por vencer', 'Vencidos'],
      datasets: [{ data: [activos, porVencer, vencidos],
        backgroundColor: ['#4ade80', '#ff9500', '#ff4444'], borderWidth: 0 }]
    },
    options: { responsive:true, plugins: defaults.plugins }
  });
  /*]]>*/
</script>
</body>
</html>
