<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('galeria')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4>GALERÍA</h4>
          </div>

          <div th:if="${exito}" class="alert-success-gym mb-3" th:text="${exito}"></div>
          <div th:if="${error}" class="alert-error mb-3" th:text="${error}"></div>

          <div class="member-form-box mb-4">
            <h6><i class="bi bi-upload me-2"></i>Subir nueva imagen</h6>
            <form th:action="@{/admin/galeria/subir}" method="post" enctype="multipart/form-data">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label-neon">Nombre</label>
                  <input type="text" name="nombre" class="form-control-dark" placeholder="Sala de pesas" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label-neon">Descripción</label>
                  <input type="text" name="descripcion" class="form-control-dark" placeholder="Vista general" />
                </div>
                <div class="col-md-4">
                  <label class="form-label-neon">Archivo</label>
                  <input type="file" name="archivo" class="form-control-dark" accept="image/*" required />
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-neon"><i class="bi bi-cloud-upload me-2"></i>Subir imagen</button>
                </div>
              </div>
            </form>
          </div>

          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr><th>Vista</th><th>Nombre</th><th>Descripción</th><th>Activo</th><th>Acciones</th></tr>
              </thead>
              <tbody>
                <tr th:each="img : ${galeria}">
                  <td><img th:src="@{/media/{filename}(filename=${img.filename})}" alt="" style="height:80px;width:auto;border-radius:6px;"/></td>
                  <td th:text="${img.nombre}"></td>
                  <td th:text="${img.descripcion}"></td>
                  <td><span th:text="${img.activo} ? 'Sí' : 'No'" th:classappend="${img.activo} ? 'badge-status activo' : 'badge-status vencido'"></span></td>
                  <td>
                    <a th:href="@{/admin/galeria/editar/{id}(id=${img.id})}" class="btn-icon" title="Editar imagen"><i class="bi bi-pencil-square"></i></a>
                    <form th:action="@{/admin/galeria/eliminar/{id}(id=${img.id})}" method="post" style="display:inline-block;">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                      <button type="submit" class="btn-icon" style="border:none;background:none;color:#f55;" title="Eliminar imagen"><i class="bi bi-trash3-fill"></i></button>
                    </form>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(galeria)}">
                  <td colspan="5" class="text-center" style="color:#bbb;padding:2rem;">No hay imágenes en la galería.</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
