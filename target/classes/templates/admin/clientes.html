<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Miembros — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div id="adminPage" class="page active">
  <div class="admin-wrap">

    <div th:replace="~{fragments/header :: admin-sidebar('clientes')}"></div>

    <div class="admin-content">
      <div class="admin-panel active">

        <div class="admin-topbar">
          <h4>LISTA DE <span>MIEMBROS</span></h4>
          <a th:href="@{/admin/clientes/nuevo}" class="btn btn-neon btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Miembro
          </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${exito}" class="alert-success-gym mb-3"><i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span></div>
        <div th:if="${error}"  class="alert-error mb-3"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span></div>

        <!-- Buscador -->
        <form th:action="@{/admin/clientes}" method="get" class="search-wrap mb-3">
          <i class="bi bi-search"></i>
          <input type="text" class="search-input" name="q" th:value="${q}"
                 placeholder="Buscar por nombre, apellido..."/>
          <button type="submit" class="btn btn-neon btn-sm ms-2">Buscar</button>
          <a th:href="@{/admin/clientes}" class="btn btn-outline-neon btn-sm ms-1">Limpiar</a>
        </form>

        <!-- Tabla -->
        <div class="chart-wrap">
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nombre</th>
                  <th>DNI</th>
                  <th>Teléfono</th>
                  <th>Plan</th>
                  <th>Estado</th>
                  <th>Vence</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${#lists.isEmpty(clientes)}">
                  <td colspan="8" style="text-align:center;color:#555;padding:2.5rem;">
                    No hay miembros registrados aún.
                  </td>
                </tr>
                <tr th:each="c, iter : ${clientes}">
                  <td style="color:#555;" th:text="${iter.count}"></td>
                  <td>
                    <strong style="color:#fff;" th:text="${c.nombreCompleto}"></strong><br>
                    <small style="color:#444;" th:text="${c.correo ?: ''}"></small>
                  </td>
                  <td style="color:#888;" th:text="${c.dni ?: '—'}"></td>
                  <td style="color:#888;" th:text="${c.telefono ?: '—'}"></td>
                  <td>
                    <span class="badge-plan"
                          th:classappend="${c.plan != null} ? 'badge-' + ${c.plan.nombre.toLowerCase()} : ''"
                          th:text="${c.plan != null ? c.plan.nombre : '—'}"></span>
                  </td>
                  <td>
                    <span th:with="dias=${c.diasRestantes}"
                          th:classappend="${dias < 0} ? 'badge-status vencido' : (${dias <= 7} ? 'badge-status vence' : 'badge-status activo')"
                          th:text="${dias < 0} ? 'Vencido' : (${dias <= 7} ? 'Por vencer' : 'Activo')">
                    </span>
                  </td>
                  <td style="color:#666;font-size:.82rem;"
                      th:text="${c.fechaVencimiento != null ? #temporals.format(c.fechaVencimiento,'dd/MM/yyyy') : '—'}">
                  </td>
                  <td>
                    <!-- Editar -->
                    <a th:href="@{/admin/clientes/editar/{id}(id=${c.id})}"
                       class="btn-icon me-1" title="Editar">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <!-- Renovar (modal simple) -->
                    <button class="btn-icon me-1" title="Renovar"
                            th:onclick="'abrirRenovar(' + ${c.id} + ')'">
                      <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <!-- Eliminar -->
                    <form th:action="@{/admin/clientes/eliminar/{id}(id=${c.id})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('¿Eliminar este miembro?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn-icon del" title="Eliminar">
                        <i class="bi bi-trash"></i>
                      </button>
                    </form>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Modal Renovar -->
<div id="modalRenovar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;">
  <div class="modal-box" style="max-width:380px;width:100%;position:relative;">
    <button onclick="cerrarRenovar()" class="modal-close"><i class="bi bi-x-lg"></i></button>
    <div class="modal-logo" style="font-size:1.3rem;">RENOVAR <span>MEMBRESÍA</span></div>
    <form id="formRenovar" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label class="form-label-neon mt-3">Plan</label>
      <select name="planId" class="form-control-dark" style="margin-bottom:1rem;">
        <option th:each="p : ${planes}" th:value="${p.id}"
                th:text="${p.nombre + ' — S/ ' + p.precio + '/mes'}"></option>
      </select>
      <label class="form-label-neon">Método de pago</label>
      <select name="metodoPago" class="form-control-dark" style="margin-bottom:1.5rem;">
        <option>Efectivo</option>
        <option>Yape</option>
        <option>Plin</option>
        <option>Transferencia</option>
      </select>
      <button type="submit" class="btn btn-neon w-100" style="padding:.75rem;">
        <i class="bi bi-arrow-clockwise me-2"></i>Confirmar Renovación
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function abrirRenovar(id) {
    document.getElementById('formRenovar').action = '/admin/clientes/renovar/' + id;
    const m = document.getElementById('modalRenovar');
    m.style.display = 'flex';
  }
  function cerrarRenovar() {
    document.getElementById('modalRenovar').style.display = 'none';
  }
  document.getElementById('modalRenovar').addEventListener('click', function(e) {
    if (e.target === this) cerrarRenovar();
  });
</script>
</body>
</html>
