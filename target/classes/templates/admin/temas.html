<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temas — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div id="adminPage" class="page active">
    <div class="admin-wrap">
      <div th:replace="~{fragments/header :: admin-sidebar('temas')}"></div>
      <div class="admin-content">
        <div class="admin-panel active">
          <div class="admin-topbar">
            <h4>TEMAS <span>DEL SITIO</span></h4>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-neon btn-sm"><i class="bi bi-house me-1"></i>Panel</a>
          </div>

          <div th:if="${exito}" class="alert-success-gym mb-3" th:text="${exito}"></div>
          <div th:if="${error}" class="alert-error mb-3" th:text="${error}"></div>

          <div class="row g-4">
            <div class="col-lg-6">
              <div class="member-form-box">
                <h6><i class="bi bi-palette-fill me-2"></i>Crear nuevo tema</h6>
                <form th:action="@{/admin/temas/nuevo}" th:object="${tema}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label-neon">Nombre del tema</label>
                      <input type="text" th:field="*{nombre}" class="form-control-dark" placeholder="Ej: Ocean" />
                    </div>
                    <div class="col-12">
                      <label class="form-label-neon">Clase CSS</label>
                      <input type="text" th:field="*{cssClass}" class="form-control-dark" placeholder="Ej: theme-ocean" />
                    </div>
                    <div class="col-12">
                      <label class="form-label-neon">Descripción</label>
                      <textarea th:field="*{descripcion}" class="form-control-dark" rows="3" placeholder="Descripción breve del tema"></textarea>
                    </div>
                    <div class="col-12 mt-2">
                      <button type="submit" class="btn btn-neon w-100"><i class="bi bi-save me-2"></i>Guardar Tema</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>

            <div class="col-lg-6">
              <div class="member-form-box">
                <h6><i class="bi bi-bounding-box-circles me-2"></i>Temas disponibles</h6>
                <div class="table-responsive">
                  <table class="admin-table">
                    <thead>
                      <tr>
                        <th>Nombre</th>
                        <th>Clase CSS</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="tema : ${temas}">
                        <td th:text="${tema.nombre}"></td>
                        <td><code th:text="${tema.cssClass}"></code></td>
                        <td><span th:text="${tema.activo} ? 'Sí' : 'No'" th:classappend="${tema.activo} ? 'badge-status activo' : 'badge-status vencido'"></span></td>
                        <td>
                          <form th:action="@{/admin/temas/activar/{id}(id=${tema.id})}" method="post" style="display:inline-block;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn-icon" title="Activar tema" style="border:none;background:none;">
                              <i class="bi bi-check2-square"></i>
                            </button>
                          </form>
                        </td>
                      </tr>
                      <tr th:if="${#lists.isEmpty(temas)}">
                        <td colspan="4" class="text-center" style="color:#bbb;padding:2rem;">No hay temas configurados.</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <p class="demo-hint">Activa un tema para cambiar el estilo del sitio en la página principal.</p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
