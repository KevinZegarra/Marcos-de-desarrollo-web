<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="'Error ' + ${status} + ' — AY Fitness Gym'">Error — AY Fitness Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="text-align:center;padding:2rem;max-width:500px;">
    <div
      style="font-family:'Barlow Condensed',sans-serif;font-size:6rem;font-weight:900;color:var(--neon);line-height:1;"
      th:text="${status}">500</div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:2rem;color:#fff;margin:.5rem 0 1rem;"
      th:text="${title} ?: 'Error del servidor'">Error del servidor</h2>
    <p style="color:#888;margin-bottom:2rem;" th:text="${message}">Ocurrió un error inesperado.</p>

    <!-- Traza de error (sólo visible en perfiles de desarrollo) -->
    <div th:if="${trace}" style="text-align:left;margin-bottom:1rem;">
      <h6 style="color:#fff;margin-bottom:.5rem;">Detalles (traza):</h6>
      <pre style="color:#ddd;background:#0b0b0b;padding:1rem;border-radius:6px;white-space:pre-wrap;overflow:auto;max-height:320px;"
           th:text="${trace}"></pre>
    </div>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a th:href="@{/}" class="btn btn-neon px-4"><i class="bi bi-house me-2"></i>Ir al inicio</a>
      <a onclick="history.back()" class="btn btn-outline-neon px-4" style="cursor:pointer;"><i
          class="bi bi-arrow-left me-2"></i>Volver</a>
    </div>
  </div>
</body>

</html>
